<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | UniCalc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23050505'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='60' fill='%23ffffff' font-family='Space Grotesk'%3EU%3C/text%3E%3C/svg%3E">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .error-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
        }
        .error-content {
            text-align: center;
            max-width: 480px;
        }
        .error-code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 15vw, 8rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--text-primary);
            opacity: 0.12;
            margin-bottom: 8px;
            user-select: none;
        }
        .error-title {
            font-family: var(--font-display);
            font-size: clamp(1.15rem, 3vw, 1.5rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .error-timer {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-bottom: 20px;
        }
        .error-timer span {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--accent);
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.88rem;
            text-decoration: none;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }
        .error-btn:hover {
            background: #2563eb;
            box-shadow: 0 4px 20px rgba(59,130,246,0.25);
        }
    </style>
</head>
<body>

    <header class="header" id="header">
        <div class="container-fluid">
            <nav class="nav">
                <a href="index.html" class="logo"><span class="logo-text">UniCalc</span></a>
                <div class="nav-center">
                    <div class="nav-links">
                        <a href="index.html#universities" class="nav-link magnetic">Universities</a>
                        <a href="predictor/" class="nav-link magnetic">Predictor</a>
                        <a href="contributors.html" class="nav-link magnetic">Contributors</a>
                    </div>
                </div>
                <div class="nav-actions">
                    <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
                        <span class="line"></span>
                        <span class="line"></span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <div class="noise-overlay"></div>

    <div class="error-wrapper">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">This page didn't make the merit list</h1>
            <p class="error-message">
                Looks like this page scored a lower aggregate than expected.
                Even the predictor couldn't save it. But hey, your chances are still fine.
                Let's get you back on track.
            </p>
            <p class="error-timer">Redirecting in <span id="countdown">8</span> seconds</p>
            <a href="index.html" class="error-btn">Back to Home &rarr;</a>
        </div>
    </div>

    <script>
        let sec = 8;
        const el = document.getElementById('countdown');
        const interval = setInterval(() => {
            sec--;
            if (el) el.textContent = sec;
            if (sec <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);

        const toggle = document.getElementById('mobileToggle');
        const links = document.querySelector('.nav-links');
        if (toggle && links) {
            toggle.addEventListener('click', () => {
                links.classList.toggle('active');
                toggle.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
